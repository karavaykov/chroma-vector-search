version: '3.8'

x-common: &common
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-service-defaults: &service-defaults
  <<: *common
  build:
    context: .
    dockerfile: ${DOCKERFILE:-Dockerfile}
  env_file:
    - .env
  environment:
    - PYTHONUNBUFFERED=1
    - PYTHONPATH=/app
  healthcheck:
    test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s

services:
  # Redis for caching and job tracking
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: chroma-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # PostgreSQL for metadata
  postgres:
    <<: *common
    image: postgres:15-alpine
    container_name: chroma-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chroma_metadata}
      POSTGRES_USER: ${POSTGRES_USER:-chroma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chroma123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chroma}"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ChromaDB for vector storage
  chromadb:
    <<: *common
    image: chromadb/chroma:0.4.22
    container_name: chroma-db
    ports:
      - "${CHROMA_PORT:-8004}:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma_data
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    volumes:
      - chroma-data:/chroma/chroma_data
      - ./data/chroma:/chroma/chroma_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Indexing Service
  indexing-service:
    <<: *service-defaults
    container_name: chroma-indexing
    build:
      context: ./services/indexing_service
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=3.9
        - MODEL_NAME=all-MiniLM-L6-v2
    ports:
      - "${INDEXING_PORT:-8001}:8001"
    environment:
      - SERVICE_NAME=indexing
      - SERVICE_PORT=8001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MODEL_CACHE_SIZE=${MODEL_CACHE_SIZE:-5}
      - BATCH_SIZE=${BATCH_SIZE:-1000}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
    volumes:
      - ./data/chroma:/app/.chroma_db
      - ${PROJECT_ROOT:-.}:/workspace:ro
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: ["python", "main.py"]
    deploy:
      resources:
        limits:
          memory: ${INDEXING_MEMORY_LIMIT:-2G}
          cpus: ${INDEXING_CPUS:-2}
        reservations:
          memory: ${INDEXING_MEMORY_RESERVATION:-1G}
          cpus: ${INDEXING_CPUS_RESERVATION:-1}

  # Search Service
  search-service:
    <<: *service-defaults
    container_name: chroma-search
    build:
      context: ./services/search_service
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=3.9
        - MODEL_NAME=all-MiniLM-L6-v2
    ports:
      - "${SEARCH_PORT:-8002}:8002"
    environment:
      - SERVICE_NAME=search
      - SERVICE_PORT=8002
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - MAX_CACHE_SIZE=${MAX_CACHE_SIZE:-10000}
    volumes:
      - ./data/chroma:/app/.chroma_db
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: ["python", "main.py"]
    deploy:
      resources:
        limits:
          memory: ${SEARCH_MEMORY_LIMIT:-1G}
          cpus: ${SEARCH_CPUS:-1}
        reservations:
          memory: ${SEARCH_MEMORY_RESERVATION:-512M}
          cpus: ${SEARCH_CPUS_RESERVATION:-0.5}

  # Metadata Service
  metadata-service:
    <<: *service-defaults
    container_name: chroma-metadata
    build:
      context: ./services/metadata_service
      dockerfile: Dockerfile
    ports:
      - "${METADATA_PORT:-8003}:8003"
    environment:
      - SERVICE_NAME=metadata
      - SERVICE_PORT=8003
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-chroma_metadata}
      - POSTGRES_USER=${POSTGRES_USER:-chroma}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chroma123}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CACHE_TTL_SECONDS=${METADATA_CACHE_TTL:-600}
    volumes:
      - ./data/chroma:/app/.chroma_db
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: ["python", "main.py"]
    deploy:
      resources:
        limits:
          memory: ${METADATA_MEMORY_LIMIT:-512M}
          cpus: ${METADATA_CPUS:-1}
        reservations:
          memory: ${METADATA_MEMORY_RESERVATION:-256M}
          cpus: ${METADATA_CPUS_RESERVATION:-0.5}

  # API Gateway
  api-gateway:
    <<: *service-defaults
    container_name: chroma-api-gateway
    build:
      context: ./services/api_gateway
      dockerfile: Dockerfile
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    environment:
      - SERVICE_NAME=api-gateway
      - SERVICE_PORT=8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - INDEXING_SERVICE_URL=http://indexing-service:8001
      - SEARCH_SERVICE_URL=http://search-service:8002
      - METADATA_SERVICE_URL=http://metadata-service:8003
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-30}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      redis:
        condition: service_healthy
      indexing-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      metadata-service:
        condition: service_healthy
    command: ["python", "main.py"]
    deploy:
      resources:
        limits:
          memory: ${GATEWAY_MEMORY_LIMIT:-512M}
          cpus: ${GATEWAY_CPUS:-1}
        reservations:
          memory: ${GATEWAY_MEMORY_RESERVATION:-256M}
          cpus: ${GATEWAY_CPUS_RESERVATION:-0.5}

  # Monitoring - Prometheus
  prometheus:
    <<: *common
    image: prom/prometheus:v2.45.0
    container_name: chroma-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    depends_on:
      - indexing-service
      - search-service
      - metadata-service
      - api-gateway

  # Monitoring - Grafana
  grafana:
    <<: *common
    image: grafana/grafana:10.0.0
    container_name: chroma-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # Optional: Nginx for load balancing (production)
  nginx:
    <<: *common
    image: nginx:alpine
    container_name: chroma-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./config/ssl:/etc/nginx/ssl
    depends_on:
      - api-gateway
    command: ["nginx", "-g", "daemon off;"]

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  chroma-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  default:
    name: chroma-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16