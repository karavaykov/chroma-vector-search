version: '3.8'

services:
  # Redis for caching and job tracking
  redis:
    image: redis:7-alpine
    container_name: chroma-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # PostgreSQL for metadata (optional)
  postgres:
    image: postgres:15-alpine
    container_name: chroma-postgres
    environment:
      POSTGRES_DB: chroma_metadata
      POSTGRES_USER: chroma
      POSTGRES_PASSWORD: chroma123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chroma"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ChromaDB for vector storage
  chromadb:
    image: chromadb/chroma:0.4.22
    container_name: chroma-db
    ports:
      - "8004:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma_data
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma-data:/chroma/chroma_data
      - ./services/.chroma_db:/chroma/chroma_data  # Mount local chroma db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Indexing Service
  indexing-service:
    build:
      context: ./services/indexing_service
      dockerfile: Dockerfile
    container_name: chroma-indexing
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./services/.chroma_db:/app/.chroma_db
      - .:/workspace:ro  # Mount project for indexing
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Search Service
  search-service:
    build:
      context: ./services/search_service
      dockerfile: Dockerfile
    container_name: chroma-search
    ports:
      - "8002:8002"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./services/.chroma_db:/app/.chroma_db
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Metadata Service
  metadata-service:
    build:
      context: ./services/metadata_service
      dockerfile: Dockerfile
    container_name: chroma-metadata
    ports:
      - "8003:8003"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=chroma_metadata
      - POSTGRES_USER=chroma
      - POSTGRES_PASSWORD=chroma123
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./services/.chroma_db:/app/.chroma_db
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/metadata/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway
  api-gateway:
    build:
      context: ./services/api_gateway
      dockerfile: Dockerfile
    container_name: chroma-api-gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - INDEXING_SERVICE_URL=http://indexing-service:8001
      - SEARCH_SERVICE_URL=http://search-service:8002
      - METADATA_SERVICE_URL=http://metadata-service:8003
    depends_on:
      redis:
        condition: service_healthy
      indexing-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      metadata-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Monitoring with Prometheus and Grafana
  prometheus:
    image: prom/prometheus:latest
    container_name: chroma-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    depends_on:
      - indexing-service
      - search-service
      - metadata-service
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    container_name: chroma-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

volumes:
  redis-data:
  postgres-data:
  chroma-data:
  prometheus-data:
  grafana-data: