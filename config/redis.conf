# Redis configuration for Chroma Vector Search

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory management
maxmemory ${REDIS_MAXMEMORY:-512mb}
maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
maxmemory-samples 5

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Logging
loglevel notice
logfile ""

# Security
# requirepass your-password-here

# Client connections
maxclients 10000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Lua scripting
lua-time-limit 5000

# Cluster (disabled)
cluster-enabled no